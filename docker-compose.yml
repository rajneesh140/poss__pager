version: "3.9"

services:
  db:
    image: mysql:8
    container_name: pos_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pos_db
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./pos_db.sql:/docker-entrypoint-initdb.d/pos_db.sql

  backend:
    build: ./pos-backend
    container_name: fastapi_backend
    depends_on:
      - db
    ports:
      - "8000:8000"
    env_file:
      - ./pos-backend/.env
    restart: always

  frontend:
    build: .
    container_name: frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: always

volumes:
  db_data: