version: "3.9"

services:
  db:
    image: mysql:8
    container_name: pos_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pos_db
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./pos-backend
    container_name: fastapi_backend
    depends_on:
      - db
    ports:
      - "8000:8000"
    restart: always
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: pos_db
      JWT_SECRET: supersecret123
    command: sh -c "sleep 15 && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build: .
    container_name: frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: always

volumes:
  db_data: