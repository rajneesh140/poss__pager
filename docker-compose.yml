services:
  db:
    image: mysql:8
    container_name: pos_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pos_db
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./pos-backend
    container_name: fastapi_backend
    restart: always
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: pos_db
      JWT_SECRET: supersecret123
    command: sh -c "sleep 15 && uvicorn app.main:app --host 0.0.0.0 --port 8000"

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`api.zervey.gridsphere.in`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"

    networks:
      - traefik-proxy

  frontend:
    build:
      context: .
      args:
        VITE_API_URL: "https://api.zervey.gridsphere.in"
    container_name: frontend
    restart: always
    depends_on:
      - backend

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`zervey.gridsphere.in`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"

    networks:
      - traefik-proxy

volumes:
  db_data:

networks:
  traefik-proxy:
    external: true